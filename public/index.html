<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Excel → CSV (user summary)</title>
    <style>
      :root {
        --bg: #0f1216;
        --fg: #e6e8eb;
        --muted: #9aa3ad;
        --acc: #3b82f6;
        --err: #f87171;
        --b: #2a3038;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
        margin: 0;
        min-height: 100vh;
        padding: 2rem clamp(1rem, 4vw, 2.5rem);
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.25rem 0;
      }
      p.lead {
        color: var(--muted);
        margin: 0 0 1.5rem 0;
        font-size: 0.95rem;
      }
      form {
        max-width: 40rem;
        border: 1px solid var(--b);
        border-radius: 8px;
        padding: 1.25rem;
        background: #12161c;
      }
      label {
        display: block;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      input[type="file"],
      input[type="text"] {
        width: 100%;
        padding: 0.5rem 0.65rem;
        border: 1px solid var(--b);
        border-radius: 6px;
        background: #0a0c10;
        color: var(--fg);
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }
      .row {
        margin-bottom: 0.25rem;
      }
      button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1.1rem;
        font-size: 0.95rem;
        font-weight: 500;
        color: #fff;
        background: var(--acc);
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .result {
        max-width: 64rem;
        margin-top: 1.5rem;
      }
      .result h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0 0 0.5rem 0;
      }
      .msg-err {
        color: var(--err);
        padding: 0.75rem 1rem;
        border: 1px solid #3f2626;
        border-radius: 6px;
        background: #1a1212;
        white-space: pre-wrap;
      }
      pre#csv {
        margin: 0;
        padding: 1rem;
        border: 1px solid var(--b);
        border-radius: 6px;
        background: #0a0c10;
        font-size: 0.8rem;
        line-height: 1.4;
        overflow: auto;
        max-height: min(60vh, 28rem);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1.25rem;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <h1>Consumption report → CSV</h1>
    <p class="lead">
      Upload a Consumption Summary (User) <code style="color: var(--acc)">.xlsx</code> file. The
      file is read in the browser, base64-encoded, and sent to <code>/api/parse?format=json</code>
      (same on Vercel and local <code>npm run dev</code>).
    </p>

    <form id="upload-form" action="/api/parse" method="post" enctype="application/json" autocomplete="off">
      <div class="row">
        <label for="file">Excel file</label>
        <input id="file" name="file" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" required />
      </div>
      <div class="row">
        <label for="sheet">Sheet name (optional)</label>
        <input
          id="sheet"
          name="sheet"
          type="text"
          placeholder="e.g. user summary"
          spellcheck="false"
        />
      </div>
      <button type="submit" id="go">Convert to CSV</button>
    </form>

    <div class="result" id="result" hidden>
      <h2>Result</h2>
      <div class="meta" id="meta"></div>
      <div id="error" class="msg-err" hidden></div>
      <p style="margin: 0.5rem 0 0.5rem 0">
        <a id="dl" href="#" download="export.csv" style="color: var(--acc); font-size: 0.9rem" hidden>Download export.csv</a>
      </p>
      <pre id="csv" hidden></pre>
    </div>

    <script>
      const form = document.getElementById("upload-form");
      const out = document.getElementById("result");
      const errEl = document.getElementById("error");
      const pre = document.getElementById("csv");
      const meta = document.getElementById("meta");
      const btn = document.getElementById("go");
      const dl = document.getElementById("dl");
      let lastBlobUrl;

      function arrayBufferToBase64(buf) {
        const bytes = new Uint8Array(buf);
        const chunk = 0x8000;
        let binary = "";
        for (let i = 0; i < bytes.length; i += chunk) {
          const sub = bytes.subarray(i, i + chunk);
          binary += String.fromCharCode.apply(null, sub);
        }
        return btoa(binary);
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const f = document.getElementById("file");
        const sheet = document.getElementById("sheet");
        if (!f.files || !f.files[0]) return;

        errEl.hidden = true;
        pre.hidden = true;
        dl.hidden = true;
        if (lastBlobUrl) {
          URL.revokeObjectURL(lastBlobUrl);
          lastBlobUrl = null;
        }
        out.hidden = true;
        btn.disabled = true;
        const file = f.files[0];
        const buf = await file.arrayBuffer();
        const fileBase64 = arrayBufferToBase64(buf);
        const payload = { fileBase64 };
        if (sheet.value && sheet.value.trim()) payload.sheetName = sheet.value.trim();

        const url = new URL("api/parse", window.location.origin);
        url.searchParams.set("format", "json");

        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify(payload),
          });
          const text = await res.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch {
            throw new Error("Server did not return JSON. Status " + res.status);
          }
          if (!res.ok) {
            throw new Error((data && data.error) || text || "Request failed: " + res.status);
          }
          if (data && data.ok && typeof data.csv === "string") {
            meta.textContent = `Rows: ${data.rowCount} · sheet: ${data.sheetName} · source: ${file.name}`;
            pre.textContent = data.csv;
            pre.hidden = false;
            const blob = new Blob([data.csv], { type: "text/csv; charset=utf-8" });
            lastBlobUrl = URL.createObjectURL(blob);
            dl.href = lastBlobUrl;
            dl.setAttribute("download", file.name.replace(/\.xlsx?$/i, "") + ".csv");
            dl.hidden = false;
            out.hidden = false;
            out.scrollIntoView({ behavior: "smooth", block: "nearest" });
            return;
          }
          throw new Error("Invalid response: missing ok/csv");
        } catch (ex) {
          errEl.textContent = String(ex && ex.message ? ex.message : ex);
          errEl.hidden = false;
          meta.textContent = "";
          out.hidden = false;
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
